<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ShopEase</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <section class="nav-container">
            <a href="/index.html" class="logo">🛒 Shop<span>Ease</span> Admin</a>
            <ul class="nav-links">
                <li><a href="/index.html">← Back to Store</a></li>
            </ul>
        </section>
    </nav>

    <main>
        <header class="admin-header">
            <h1>Product Management</h1>
            <button id="add-product-btn" class="btn btn-primary">+ Add Product</button>
        </header>

        <p id="loading" class="loading"><span class="spinner"></span></p>

        <section class="admin-table">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-products-body"></tbody>
            </table>
        </section>
    </main>

    <section id="product-modal" class="modal-overlay">
        <form id="product-form" class="modal">
            <h3 id="modal-title">Add New Product</h3>
            <p class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" required>
            </p>
            <p class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" required></textarea>
            </p>
            <p class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" step="0.01" min="0" required>
            </p>
            <p class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" required>
            </p>
            <p class="form-group">
                <label for="imageUrl">Image URL</label>
                <input type="url" id="imageUrl" name="imageUrl" required>
            </p>
            <p class="form-group">
                <label for="stockQuantity">Stock Quantity</label>
                <input type="number" id="stockQuantity" name="stockQuantity" min="0" required>
            </p>
            <section class="modal-actions">
                <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Product</button>
            </section>
        </form>
    </section>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
