<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopEase</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <section class="nav-container">
            <a href="/index.html" class="logo">🛒 Shop<span>Ease</span></a>
            <button class="mobile-menu-btn" aria-label="Menu">☰</button>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/wishlist.html">Wishlist</a></li>
                <li><a href="/login.html" id="nav-login">Login</a></li>
                <li id="nav-user" style="display:none"></li>
                <li><a href="/cart.html" class="cart-link active">🛒 Cart <span class="cart-count">0</span></a></li>
            </ul>
        </section>
    </nav>

    <main>
        <h1 style="margin-bottom:1.5rem">Shopping Cart</h1>

        <section id="cart-empty" class="empty-state" style="display:none">
            <p class="icon">🛒</p>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added any products yet.</p>
            <a href="/index.html" class="btn btn-primary">Continue Shopping</a>
        </section>

        <section id="cart-content" class="cart-layout" style="display:none">
            <section class="cart-items" id="cart-items"></section>
            <aside class="cart-summary">
                <h3>Order Summary</h3>
                <p class="summary-row"><span>Items</span><span id="summary-count">0</span></p>
                <p class="summary-row"><span>Subtotal</span><span id="summary-subtotal">$0.00</span></p>
                <p class="summary-row total"><span>Total</span><span id="summary-total">$0.00</span></p>
                <a href="/checkout.html" class="btn btn-primary btn-lg">Proceed to Checkout</a>
                <button id="clear-cart-btn" class="btn btn-secondary" style="margin-top:0.5rem">Clear Cart</button>
            </aside>
        </section>
    </main>

    <footer><p>&copy; 2026 ShopEase E-Commerce</p></footer>

    <script src="/js/cart.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/cart-page.js"></script>
</body>
</html>
