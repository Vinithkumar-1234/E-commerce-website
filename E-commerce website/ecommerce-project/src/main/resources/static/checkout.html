<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopEase</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <section class="nav-container">
            <a href="/index.html" class="logo">🛒 Shop<span>Ease</span></a>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/cart.html" class="cart-link">🛒 Cart <span class="cart-count">0</span></a></li>
            </ul>
        </section>
    </nav>

    <main>
        <h1 style="margin-bottom:1.5rem">Checkout</h1>

        <section id="checkout-section" class="checkout-layout">
            <form id="checkout-form" class="checkout-form">
                <h2>Shipping Details</h2>
                <p class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required>
                    <span class="error-message" id="fullName-error"></span>
                </p>
                <p class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                    <span class="error-message" id="email-error"></span>
                </p>
                <p class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" required>
                    <span class="error-message" id="phone-error"></span>
                </p>
                <p class="form-group">
                    <label for="address">Address *</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                    <span class="error-message" id="address-error"></span>
                </p>
                <section class="form-row">
                    <p class="form-group">
                        <label for="city">City *</label>
                        <input type="text" id="city" name="city" required>
                        <span class="error-message" id="city-error"></span>
                    </p>
                    <p class="form-group">
                        <label for="pincode">Pincode *</label>
                        <input type="text" id="pincode" name="pincode" required>
                        <span class="error-message" id="pincode-error"></span>
                    </p>
                </section>
                <p class="form-group">
                    <label for="paymentMethod">Payment Method *</label>
                    <select id="paymentMethod" name="paymentMethod" required>
                        <option value="">Select payment method</option>
                        <option value="Credit Card">Credit Card (Test Mode)</option>
                        <option value="Debit Card">Debit Card (Test Mode)</option>
                        <option value="UPI">UPI (Test Mode)</option>
                        <option value="Cash on Delivery">Cash on Delivery</option>
                        <option value="Net Banking">Net Banking (Test Mode)</option>
                    </select>
                    <span class="error-message" id="paymentMethod-error"></span>
                </p>
                <button type="submit" class="btn btn-success btn-lg">Place Order</button>
            </form>

            <aside class="cart-summary">
                <h3>Order Summary</h3>
                <section id="order-items"></section>
                <p class="summary-row total"><span>Total</span><span id="order-total">$0.00</span></p>
            </aside>
        </section>

        <section id="order-confirmation" class="order-confirmation" style="display:none">
            <p class="success-icon">✓</p>
            <h2>Order Placed Successfully!</h2>
            <p>Thank you for your purchase. Your order has been confirmed.</p>
            <p class="order-id" id="confirm-order-id"></p>
            <p>Payment Method: <strong id="confirm-payment"></strong></p>
            <a href="/index.html" class="btn btn-primary btn-lg">Continue Shopping</a>
        </section>
    </main>

    <footer><p>&copy; 2026 ShopEase E-Commerce</p></footer>

    <script src="/js/cart.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/checkout.js"></script>
</body>
</html>
