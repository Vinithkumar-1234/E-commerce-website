<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ShopEase</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <section class="nav-container">
            <a href="/index.html" class="logo">🛒 Shop<span>Ease</span></a>
        </section>
    </nav>

    <main>
        <section class="auth-container">
            <h2>Create Account</h2>
            <p class="subtitle">Join ShopEase today</p>
            <form id="signup-form">
                <p class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </p>
                <p class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </p>
                <p class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="Min 6 characters">
                </p>
                <p class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm password">
                </p>
                <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="/login.html">Sign in</a></p>
        </section>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth-pages.js"></script>
</body>
</html>
